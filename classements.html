<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100% FOOT - Classements</title>

<style>
body{margin:0;font-family:Arial;background:#0b0f1a;color:white;}
header{text-align:center;padding:20px;font-size:24px;color:#00f0ff;}
table{
width:90%;
margin:40px auto;
border-collapse:collapse;
background:#111827;
border-radius:15px;
overflow:hidden;
}
th,td{
padding:15px;
text-align:center;
border-bottom:1px solid #1f2937;
}
th{color:#00f0ff;}
tr:hover{background:#1f2937;}
</style>
</head>

<body>

<header>📊 Classement Ligue 1</header>

<table id="classement">
<thead>
<tr>
<th>#</th>
<th>Équipe</th>
<th>Points</th>
</tr>
</thead>
<tbody>
<tr><td></td><td>PSG</td><td>65</td></tr>
<tr><td></td><td>Marseille</td><td>59</td></tr>
<tr><td></td><td>Monaco</td><td>55</td></tr>
<tr><td></td><td>Lille</td><td>52</td></tr>
<tr><td></td><td>Lyon</td><td>48</td></tr>
</tbody>
</table>

<script>
const table = document.querySelector("#classement tbody");
const rows = Array.from(table.querySelectorAll("tr"));

rows.sort((a,b)=>{
    const pointsA = parseInt(a.children[2].innerText);
    const pointsB = parseInt(b.children[2].innerText);
    return pointsB - pointsA;
});

rows.forEach((row,index)=>{
    row.children[0].innerText = index + 1;
    table.appendChild(row);
});
</script>

</body>
</html>
