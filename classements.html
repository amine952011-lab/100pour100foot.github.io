<!DOCTYPE html>
<html lang="fr">
<head>

<title>Classement Ligue 1</title>

<style>
body {

h1 {

table {
width: 100%;

thead {

}

tbody tr {

}

transform: scale(1.01);
}

.ucl {

}

.relegation {

}

button {
margin-top: 20px;
padding: 12px 20px;
background: #00ffc3;
border: none;
border-radius: 8px;
font-weight: bold;
cursor: pointer;
transition: 0.3s;
}

button:hover {
background: #00b894;
}
</style>
</head>

</tbody>

<button onclick="trierClassement()">Actualiser classement</button>

<script>
function trierClassement() {
let tbody = document.getElementById("classement-body");
let lignes = Array.from(tbody.querySelectorAll("tr"));

lignes.sort((a, b) => {
let pointsA = parseInt(a.querySelector(".points").textContent);
let pointsB = parseInt(b.querySelector(".points").textContent);
return pointsB - pointsA;
});

tbody.innerHTML = "";

lignes.forEach((ligne, index) => {

ligne.classList.remove("ucl","relegation");

if(index < 3){
ligne.classList.add("ucl");
}

if(index >= lignes.length - 2){
ligne.classList.add("relegation");
}

ligne.children[0].textContent = index + 1;
tbody.appendChild(ligne);

});
}

window.onload = trierClassement;
</script>
